<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U Festival - Kaart</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <span class="header__logo-icon">U<span class="heart">♥</span></span>
      FESTIVAL
    </div>
    <div class="header__controls">
      <div class="theme-toggle" id="btn-theme"></div>
      <div class="lang-flag" id="btn-lang">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <!-- Main Content (volgens wireframe 'Map') -->
  <main class="container" style="padding: 10px;">
    
    <div class="map-placeholder">
      <!-- Decoratieve lijnen om een map the simuleren (zoals in de wireframe) -->
      <div style="position: relative; width: 100%; height: 100%; overflow: hidden;">
        <!-- Lijnen -->
        <div style="position: absolute; top: 0; left: 30%; width: 2px; height: 100%; background: #DDD; transform: rotate(30deg);"></div>
        <div style="position: absolute; top: 0; left: 60%; width: 2px; height: 100%; background: #DDD; transform: rotate(30deg);"></div>
        <div style="position: absolute; top: 50%; left: -20%; width: 150%; height: 2px; background: #DDD; transform: rotate(-30deg);"></div>
        
        <!-- Gebouwen blokken -->
        <div style="position: absolute; top: 40%; left: 60%; width: 60px; height: 80px; background: #EEE; transform: rotate(-30deg); border: 1px solid #CCC;"></div>
        <div style="position: absolute; top: 70%; left: 20%; width: 50px; height: 50px; background: #EEE; transform: rotate(-30deg); border: 1px solid #CCC;"></div>
        
        <!-- You are here marker -->
        <div style="position: absolute; top: 55%; left: 50%; display: flex; flex-direction: column; align-items: center; text-align: center;">
          <div style="width: 16px; height: 16px; border: 3px solid #666; border-radius: 50%; background: #FAFAFA;">
            <div style="width: 6px; height: 6px; background: #666; border-radius: 50%; margin: 2px auto;"></div>
          </div>
          <div style="font-size: 0.7rem; color: #666; font-weight: bold; margin-top: 5px;">YOU<br>ARE HERE</div>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <!-- Home SVG -->
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <a href="info.html" class="nav-item">
      <!-- Info SVG -->
      <svg class="nav-icon nav-icon-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    </a>
    <a href="programma.html" class="nav-item">
      <!-- Music SVG -->
      <svg class="nav-icon nav-icon-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </a>
    <a href="kaart.html" class="nav-item active">
      <!-- Map Pin SVG -->
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </a>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
