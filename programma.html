<!DOCTYPE html>
<html lang="nl" data-lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U Festival - Programma</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header__logo">
      <span class="header__logo-icon">U<span class="heart">♥</span></span>
      FESTIVAL
    </div>
    <div class="header__controls">
      <div class="theme-toggle" id="btn-theme"></div>
      <div class="lang-flag" id="btn-lang">
        <span></span><span></span><span></span>
      </div>
    </div>
  </header>

  <!-- Main Content (volgens screenshot 2: Programma) -->
  <main class="container">
    
    <div class="tabs">
      <div class="tab black">Zaterdag</div>
      <div class="tab petrol">Zondag</div>
    </div>

    <div class="schedule-grid">
      <!-- Header row (tijden) -->
      <div></div> <!-- empty corner -->
      <div class="time-header">10:00</div>
      <div class="time-header">11:00</div>

      <!-- Row 1: Poton -->
      <div class="stage-row">
        <div class="stage-name">Poton</div>
        <div class="schedule-cell"></div>
        <div class="schedule-cell">
          <a href="artiest.html" class="schedule-block">
            <span>Spinvis</span>
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </a>
        </div>
      </div>

      <!-- Row 2: Club -->
      <div class="stage-row">
        <div class="stage-name">Club</div>
        <div class="schedule-cell"></div>
        <div class="schedule-cell"></div>
      </div>

      <!-- Row 3: Lake -->
      <div class="stage-row">
        <div class="stage-name">Lake</div>
        <div class="schedule-cell">
          <div class="schedule-block span-2" style="width: 150%;">
            <span>Stand-up</span>
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
        </div>
        <div class="schedule-cell"></div>
      </div>

      <!-- Row 4: Hangar -->
      <div class="stage-row">
        <div class="stage-name" style="border-bottom: 1px solid var(--color-grid-line);">Hangar</div>
        <div class="schedule-cell">
          <div class="schedule-block span-2">
            <span>DJ set 1</span>
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
        </div>
        <div class="schedule-cell"></div>
      </div>
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <!-- Home SVG -->
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <a href="info.html" class="nav-item">
      <!-- Info SVG -->
      <svg class="nav-icon nav-icon-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    </a>
    <a href="programma.html" class="nav-item active">
      <!-- Music SVG -->
      <svg class="nav-icon nav-icon-music" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </a>
    <a href="kaart.html" class="nav-item">
      <!-- Map Pin SVG -->
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </a>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
